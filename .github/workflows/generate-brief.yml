name: Generate AUD/USD Brief

on:
  schedule:
    # 8pm UTC Sun–Thu = 6am AEST Mon–Fri
    - cron: '0 20 * * 0-4'
  workflow_dispatch:   # manual trigger from GitHub Actions tab
  push:
    branches: [main]
    paths:
      - 'generate_brief.py'
      - 'planning/fx_dashboard.html'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate brief and send email
        env:
          AV_API_KEY:         ${{ secrets.AV_API_KEY }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL:           ${{ secrets.TO_EMAIL }}
        run: python3 generate_brief.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet && echo "No changes" || \
            (git commit -m "Brief: $(date -u +'%Y-%m-%d %H:%M UTC')" && git push)
